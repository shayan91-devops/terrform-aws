name: Script — create and delete temp files

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  run-file-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run create-and-delete-files script
        run: bash script/create-and-delete-files.sh
