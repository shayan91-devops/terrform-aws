name: Create two files

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  create-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create two files
        run: |
          mkdir -p generated
          echo "file one" > generated/file1.txt
          echo "file two" > generated/file2.txt

      - name: List created files
        run: ls -la generated/
